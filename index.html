<div id="law" class="tab-content space-y-4">
    <div class="bg-white p-6 rounded-3xl border-2 border-dashed border-blue-300 text-center">
        <i class="fa fa-copy text-4xl text-blue-500 mb-2"></i>
        <h3 class="font-bold text-slate-800">Mock Test Upload</h3>
        <p class="text-[10px] text-slate-400 mb-4">Multiple photos select karein (Question + Answer)</p>
        
        <input type="file" id="fileInp" multiple class="hidden" onchange="handleMultipleFiles(event)">
        <label for="fileInp" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold cursor-pointer inline-block shadow-lg">UPLOAD ALL PHOTOS</label>
        
        <div id="multiPreview" class="grid grid-cols-3 gap-2 mt-4"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-100">
        <table class="w-full text-[11px] text-left border-collapse">
            <thead class="bg-slate-800 text-white font-bold uppercase">
                <tr>
                    <th class="p-3 border-r border-slate-700">Question</th>
                    <th class="p-3 border-r border-slate-700">Suggested</th>
                    <th class="p-3">Final Ans</th>
                </tr>
            </thead>
            <tbody id="evalTable" class="text-slate-600 bg-white font-medium italic">
                <tr>
                    <td class="p-3 border-r border-b border-slate-100">Click + to add</td>
                    <td class="p-3 border-r border-b border-slate-100 italic">ICAI Key...</td>
                    <td class="p-3 border-b border-slate-100">Review...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function handleMultipleFiles(e) {
        const container = document.getElementById('multiPreview');
        container.innerHTML = ""; // Clear purani photos
        Array.from(e.target.files).forEach(file => {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            img.className = "h-20 w-full object-cover rounded-lg border shadow-sm";
            container.appendChild(img);
        });
        alert("Badshah, " + e.target.files.length + " photos select ho gayi hain!");
    }

    // Modal mein Column data save karne ke liye script
    function saveNote() {
        const val = document.getElementById('noteInp').value;
        if(!val) return;
        
        // Agar Law tab active hai toh table mein dalo
        const table = document.getElementById('evalTable');
        const row = table.insertRow(0);
        row.innerHTML = `
            <td class="p-3 border-r border-b border-slate-100">${val.split('|')[0] || 'Q'}</td>
            <td class="p-3 border-r border-b border-slate-100 text-blue-600">${val.split('|')[1] || 'ICAI'}</td>
            <td class="p-3 border-b border-slate-100 font-bold">${val.split('|')[2] || 'Ans'}</td>
        `;
        
        document.getElementById('noteInp').value = "";
        closeModal();
    }
</script>
