<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A&L BADSHAH FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .badshah-card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        button:active { transform: scale(0.95); }
        .nav-active { color: #2563eb !important; border-top: 3px solid #2563eb; }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-32">
    <div class="max-w-md mx-auto p-4">
        
        <header class="flex justify-between items-center mb-6 px-1">
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">A&L <span class="text-blue-600">Badshah</span></h1>
            <span class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-bold">V.FINAL</span>
        </header>

        <div id="dashboard" class="tab-content active space-y-4">
            <input type="text" id="searchInput" oninput="checkSearch()" placeholder='Type "STUDY ROOT" for progress...' 
                   class="w-full p-4 rounded-2xl shadow-sm border-none outline-none font-bold bg-white text-blue-600">

            <div id="rootAnalysis" class="hidden badshah-card p-5 border-2 border-blue-500">
                <h3 class="text-blue-600 font-black text-xs mb-3 italic">🚀 MISSION 90+ PROGRESS</h3>
                <div id="notesContainer" class="space-y-3"></div>
            </div>

            <div class="bg-slate-900 text-white p-6 rounded-[2rem] shadow-xl">
                <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Logic Focus</p>
                <p class="text-sm font-medium mt-1 italic">"Concept First, Accounting Terms Second."</p>
            </div>
        </div>

        <div id="law" class="tab-content space-y-4">
            <div class="badshah-card p-6 border-2 border-dashed border-blue-200 text-center">
                <i class="fa fa-camera text-4xl text-blue-500 mb-2"></i>
                <h3 class="font-bold text-slate-800">Check My Mock Test</h3>
                <p class="text-[10px] text-slate-400 mb-4 font-bold uppercase underline">Select Question + Answer Photos</p>
                
                <input type="file" id="fileInp" multiple accept="image/*" class="hidden" onchange="handleFiles(event)">
                <label for="fileInp" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black cursor-pointer inline-block shadow-lg">UPLOAD ALL</label>
                
                <div id="previewGrid" class="grid grid-cols-3 gap-2 mt-4"></div>
            </div>

            <div class="badshah-card overflow-hidden border border-slate-100">
                <div class="bg-slate-800 text-white p-3 text-[10px] font-bold tracking-widest">EVALUATION GRID</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-[10px] text-left">
                        <thead class="bg-slate-100 text-slate-500 uppercase">
                            <tr>
                                <th class="p-3 border-r">Q. Topic</th>
                                <th class="p-3 border-r">ICAI Suggested</th>
                                <th class="p-3">Final Result</th>
                            </tr>
                        </thead>
                        <tbody id="evalTable" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center p-6 z-[100] backdrop-blur-md">
        <div class="bg-white w-full p-8 rounded-[2.5rem] shadow-2xl">
            <h3 class="font-black text-xl mb-4">Add Study Note</h3>
            <p class="text-[9px] text-slate-400 mb-2">FORMAT: <span class="text-blue-600">Topic | Suggested | My Ans</span></p>
            <textarea id="noteInp" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 h-32 border-none outline-none font-bold" placeholder="Example: BRS | Target Passbook | Tally"></textarea>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400">Cancel</button>
                <button onclick="saveNote()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">SAVE</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white border-t border-slate-200 flex items-center justify-around px-2 z-50">
        <button onclick="showTab('dashboard', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400 nav-active">
            <i class="fa fa-home-alt text-xl"></i><span class="text-[9px] font-bold">HOME</span>
        </button>
        <button onclick="openModal()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl shadow-xl -mt-10 flex items-center justify-center border-4 border-slate-50">
            <i class="fa fa-plus text-xl"></i>
        </button>
        <button onclick="showTab('law', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
            <i class="fa fa-gavel text-xl"></i><span class="text-[9px] font-bold">LAW GRID</span>
        </button>
    </nav>

    <script>
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('nav-active');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveNote() {
            const input = document.getElementById('noteInp').value;
            if(!input) return;
            const parts = input.split('|');
            
            // Table Entry
            const table = document.getElementById('evalTable');
            const row = table.insertRow(0);
            row.innerHTML = `<td class="p-3 border-r font-bold text-slate-800">${parts[0]||'-'}</td><td class="p-3 border-r text-blue-600 font-medium">${parts[1]||'-'}</td><td class="p-3 font-bold text-green-600">${parts[2]||'-'}</td>`;
            
            // Root Entry
            const div = document.createElement('div');
            div.className = "p-4 bg-blue-50 rounded-2xl border-l-4 border-blue-600 text-[11px] font-bold";
            div.innerHTML = `⭐ ${parts[0] || 'Note'}`;
            document.getElementById('notesContainer').prepend(div);

            document.getElementById('noteInp').value = "";
            closeModal();
        }

        function handleFiles(e) {
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = "";
            Array.from(e.target.files).forEach(file => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = "h-20 w-full object-cover rounded-xl border-2 border-white shadow-sm";
                grid.appendChild(img);
            });
        }

        function checkSearch() {
            const v = document.getElementById('searchInput').value.toUpperCase();
            document.getElementById('rootAnalysis').className = (v === "STUDY ROOT") ? "block badshah-card p-5 border-2 border-blue-500" : "hidden";
        }
    </script>
</body>
</html>
